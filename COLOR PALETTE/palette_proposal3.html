<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #F8F6F2;
        }
        .color-box {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .color-swatch {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            border: 1px solid #000;
        }
        .color-label {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Color Palette</h1>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #2B3F4E;"></div>
        <span class="color-label">#2B3F4E</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #F7F4ED;"></div>
        <span class="color-label">#F7F4ED</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #3A6EA5;"></div>
        <span class="color-label">#3A6EA5</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #D3D3D3;"></div>
        <span class="color-label">#D3D3D3</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #FFC107;"></div>
        <span class="color-label">#FFC107</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #333333;"></div>
        <span class="color-label">#333333</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #6B8E23;"></div>
        <span class="color-label">#6B8E23</span>
    </div>
</body>
</html>
