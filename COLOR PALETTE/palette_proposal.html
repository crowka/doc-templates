<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #F7F4ED;
        }
        .color-box {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .color-swatch {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            border: 1px solid #000;
        }
        .color-label {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Color Palette</h1>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #F7F4ED;"></div>
        <span class="color-label">#F7F4ED</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #B8E5EB;"></div>
        <span class="color-label">#B8E5EB</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #3344FF;"></div>
        <span class="color-label">#3344FF</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #F2C699;"></div>
        <span class="color-label">#F2C699</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #45B8D9;"></div>
        <span class="color-label">#45B8D9</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #FF9B7D;"></div>
        <span class="color-label">#FF9B7D</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #092442;"></div>
        <span class="color-label">#092442</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #7B4B94;"></div>
        <span class="color-label">#7B4B94</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #A7D7A9;"></div>
        <span class="color-label">#A7D7A9</span>
    </div>
</body>
</html>
