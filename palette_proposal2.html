<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #F8F6F2;
        }
        .color-box {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .color-swatch {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            border: 1px solid #000;
        }
        .color-label {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Color Palette</h1>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #2B3F4E;"></div>
        <span class="color-label">#2B3F4E</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #F8F6F2;"></div>
        <span class="color-label">#F8F6F2</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #3E8C75;"></div>
        <span class="color-label">#3E8C75</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #D66853;"></div>
        <span class="color-label">#D66853</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #8294A5;"></div>
        <span class="color-label">#8294A5</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #E9C37C;"></div>
        <span class="color-label">#E9C37C</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #475B4F;"></div>
        <span class="color-label">#475B4F</span>
    </div>
    <div class="color-box">
        <div class="color-swatch" style="background-color: #F4E5D7;"></div>
        <span class="color-label">#F4E5D7</span>
    </div>
</body>
</html>
